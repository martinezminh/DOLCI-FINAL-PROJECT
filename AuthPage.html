<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolci — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #c95c7a;
    --primary-dark: #b03660;
    --foreground: #2d1a20;
    --muted-foreground: #b07a8e;
    --border: #e5c7d1;
    --destructive: #dc2626;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'DM Sans', sans-serif; color: var(--foreground); }
  h1, h2, h3 { margin: 0; font-family: 'Playfair Display', serif; }
  p, span, button, input, a, label { font-family: 'DM Sans', sans-serif; }
  button { cursor: pointer; font: inherit; }

  .auth-screen {
    min-height: 100vh;
    background: linear-gradient(to bottom right, #fff0f5, #fce4ef, #f9d0e4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 1rem;
    position: relative;
    overflow: hidden;
  }

  .back-link {
    position: absolute;
    top: 1.5rem;
    left: 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted-foreground);
    font-size: 0.875rem;
    text-decoration: none;
    transition: color 0.2s;
    z-index: 2;
  }
  .back-link:hover { color: var(--primary); }

  .blob { position: absolute; border-radius: 999px; pointer-events: none; filter: blur(60px); }
  .blob-1 { top: -60px; right: -60px; width: 24rem; height: 24rem; background: rgba(249,188,212,0.3); }
  .blob-2 { bottom: -40px; left: -40px; width: 18rem; height: 18rem; background: rgba(252,228,239,0.5); }

  .auth-wrap { position: relative; width: 100%; max-width: 28rem; z-index: 1; }

  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo p:first-child {
    font-size: 2.25rem;
    font-style: italic;
    letter-spacing: 0.2em;
    color: var(--primary);
    margin: 0;
  }
  .auth-logo .tag { color: var(--muted-foreground); font-size: 0.875rem; margin-top: 0.25rem; }

  .auth-card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border-radius: 1.5rem;
    border: 1px solid rgba(201,64,112,0.12);
    box-shadow: 0 8px 60px rgba(201,64,112,0.12);
    overflow: hidden;
  }

  .tab-switcher { display: flex; border-bottom: 1px solid rgba(201,64,112,0.1); }
  .tab-btn {
    flex: 1;
    padding: 1rem;
    background: none;
    border: none;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--muted-foreground);
    position: relative;
    transition: color 0.2s;
  }
  .tab-btn:hover { color: var(--foreground); }
  .tab-btn.active { color: var(--primary); }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--primary);
  }

  .auth-form { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }

  .field-group { display: none; flex-direction: column; gap: 1rem; }
  .field-group.visible { display: flex; }

  .field label {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.75rem;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.375rem;
  }

  .field input {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 0.75rem;
    border: 1px solid rgba(201,64,112,0.2);
    background: #fdf7fa;
    color: var(--foreground);
    font-size: 0.875rem;
  }
  .field input:focus { outline: none; border-color: var(--primary); }
  .field input::placeholder { color: var(--muted-foreground); }

  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 3rem; }
  .toggle-eye {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted-foreground);
    display: inline-flex;
    padding: 0;
  }
  .toggle-eye:hover { color: var(--primary); }

  .error-msg {
    font-size: 0.75rem;
    color: var(--destructive);
    background: #fef2f2;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    border: 1px solid #fee2e2;
    display: none;
  }
  .error-msg.visible { display: block; }

  .forgot-btn {
    background: none;
    border: none;
    font-size: 0.75rem;
    color: var(--primary);
    text-align: right;
  }
  .forgot-btn:hover { text-decoration: underline; }

  .submit-btn {
    width: 100%;
    padding: 0.875rem;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(201,64,112,0.3);
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }
  .submit-btn:hover:not(:disabled) { background: var(--primary-dark); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .spinner {
    width: 1rem; height: 1rem;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 999px;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .switch-note {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted-foreground);
    margin-top: 0.25rem;
  }
  .switch-note button {
    background: none;
    border: none;
    color: var(--primary);
    font-weight: 500;
    font-size: 0.75rem;
    padding: 0;
  }
  .switch-note button:hover { text-decoration: underline; }

  .divider-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0.25rem 0;
  }
  .divider-row .line { flex: 1; height: 1px; background: var(--border); }
  .divider-row span { font-size: 0.75rem; color: var(--muted-foreground); white-space: nowrap; }

  .guest-btn {
    width: 100%;
    padding: 0.75rem;
    background: white;
    border: 1px solid rgba(201,64,112,0.25);
    color: var(--muted-foreground);
    border-radius: 999px;
    font-size: 0.875rem;
    transition: all 0.2s;
  }
  .guest-btn:hover { border-color: var(--primary); color: var(--primary); }

  .legal-note {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted-foreground);
    margin-top: 1.5rem;
  }
  .legal-note span { color: var(--primary); cursor: pointer; }
  .legal-note span:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="auth-screen">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to DOLCI
  </a>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-wrap">
    <div class="auth-logo">
      <p>DOLCI</p>
      <p class="tag">Artisan Cakes, Made with Love</p>
    </div>

    <div class="auth-card">
      <div class="tab-switcher">
        <button class="tab-btn active" id="tabLogin" data-mode="login">Sign In</button>
        <button class="tab-btn" id="tabSignup" data-mode="signup">Create Account</button>
      </div>

      <form class="auth-form" id="authForm">
        <div class="field-group visible" id="fieldGroup">
          <div class="field" id="nameField" style="display:none;">
            <label>Full Name *</label>
            <input name="name" type="text" placeholder="John Doe" autocomplete="name">
          </div>

          <div class="field">
            <label>Email Address *</label>
            <input name="email" type="email" placeholder="name@gmail.com" autocomplete="email">
          </div>

          <div class="field" id="phoneField" style="display:none;">
            <label>Phone</label>
            <input name="phone" type="tel" placeholder="+63 912 345 6789">
          </div>

          <div class="field">
            <label>Password *</label>
            <div class="password-wrap">
              <input name="password" id="passwordInput" type="password" placeholder="Min. 6 characters" autocomplete="current-password">
              <button type="button" class="toggle-eye" id="toggleEye">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="field" id="addressField" style="display:none;">
            <label>Delivery Address</label>
            <input name="address" type="text" placeholder="Talamban, Cebu City, Philippines">
          </div>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button type="button" class="forgot-btn" id="forgotBtn">Forgot password?</button>

        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>

        <p class="switch-note" id="switchNote">
          Don't have an account? <button type="button" id="switchModeBtn">Sign up</button>
        </p>

        <div class="divider-row" id="dividerRow">
          <div class="line"></div><span>or continue as guest</span><div class="line"></div>
        </div>

        <button type="button" class="guest-btn" id="guestBtn">Browse as Guest</button>
      </form>
    </div>

    <p class="legal-note">
      By continuing, you agree to our <span>Terms of Service</span> and <span>Privacy Policy</span>.
    </p>
  </div>
</div>

<script>
  let mode = 'login';
  let showPassword = false;
  let loading = false;

  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const nameField = document.getElementById('nameField');
  const phoneField = document.getElementById('phoneField');
  const addressField = document.getElementById('addressField');
  const forgotBtn = document.getElementById('forgotBtn');
  const switchNote = document.getElementById('switchNote');
  const switchModeBtn = document.getElementById('switchModeBtn');
  const dividerRow = document.getElementById('dividerRow');
  const guestBtn = document.getElementById('guestBtn');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const authForm = document.getElementById('authForm');
  const passwordInput = document.getElementById('passwordInput');
  const toggleEye = document.getElementById('toggleEye');
  const eyeIcon = document.getElementById('eyeIcon');

  function setMode(m) {
    mode = m;
    errorMsg.classList.remove('visible');
    tabLogin.classList.toggle('active', m === 'login');
    tabSignup.classList.toggle('active', m === 'signup');
    nameField.style.display = m === 'signup' ? 'block' : 'none';
    phoneField.style.display = m === 'signup' ? 'block' : 'none';
    addressField.style.display = m === 'signup' ? 'block' : 'none';
    forgotBtn.style.display = m === 'login' ? 'block' : 'none';
    dividerRow.style.display = m === 'login' ? 'flex' : 'none';
    guestBtn.style.display = m === 'login' ? 'block' : 'none';
    switchNote.innerHTML = m === 'login'
      ? `Don't have an account? <button type="button" id="switchModeBtn">Sign up</button>`
      : `Already have an account? <button type="button" id="switchModeBtn">Sign in</button>`;
    submitBtn.textContent = m === 'login' ? 'Sign In' : 'Create Account';
    document.getElementById('switchModeBtn').addEventListener('click', () => setMode(m === 'login' ? 'signup' : 'login'));
  }

  tabLogin.addEventListener('click', () => setMode('login'));
  tabSignup.addEventListener('click', () => setMode('signup'));
  document.getElementById('switchModeBtn').addEventListener('click', () => setMode(mode === 'login' ? 'signup' : 'login'));

  toggleEye.addEventListener('click', () => {
    showPassword = !showPassword;
    passwordInput.type = showPassword ? 'text' : 'password';
    eyeIcon.innerHTML = showPassword
      ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>';
  });

  forgotBtn.addEventListener('click', () => alert('Password reset is not available in this preview.'));

  function goHome(user) {
    localStorage.setItem('dolci_user', JSON.stringify(user));
    window.location.href = 'index.html';
  }

  authForm.addEventListener('submit', (e) => {
    e.preventDefault();
    errorMsg.classList.remove('visible');

    const name = authForm.name.value.trim();
    const email = authForm.email.value.trim();
    const phone = authForm.phone.value.trim();
    const address = authForm.address.value.trim();
    const password = authForm.password.value;

    if (!email || !password) {
      errorMsg.textContent = 'Please fill in all required fields.';
      errorMsg.classList.add('visible');
      return;
    }
    if (mode === 'signup' && !name) {
      errorMsg.textContent = 'Please enter your full name.';
      errorMsg.classList.add('visible');
      return;
    }
    if (password.length < 6) {
      errorMsg.textContent = 'Password must be at least 6 characters.';
      errorMsg.classList.add('visible');
      return;
    }

    loading = true;
    submitBtn.disabled = true;
    submitBtn.innerHTML = `<span class="spinner"></span> ${mode === 'login' ? 'Signing in...' : 'Creating account...'}`;

    setTimeout(() => {
      const user = {
        id: `user_${Date.now()}`,
        name: name || email.split('@')[0],
        email: email,
        phone: phone || '+1 (212) 555-0000',
        avatar: name ? name.slice(0, 2).toUpperCase() : email.slice(0, 2).toUpperCase(),
        joinedDate: new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
        address: address || '',
      };
      goHome(user);
    }, 1200);
  });

  guestBtn.addEventListener('click', () => {
    goHome({
      id: 'guest_001',
      name: 'Guest',
      email: 'guest@dolci.com',
      phone: '',
      avatar: 'GU',
      joinedDate: 'July 2026',
      address: '',
    });
  });

  setMode('login');
</script>
</body>
</html>
