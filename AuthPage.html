<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolci — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #c95c7a;
    --primary-dark: #b03660;
    --foreground: #2d1a20;
    --muted-foreground: #b07a8e;
    --border: #e5c7d1;
    --destructive: #dc2626;
    --secondary: #fde8ef;
    --background: #fff8f9;
    --border-soft: #f9c4d4;
    --footer-bg: #2b171d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'DM Sans', sans-serif; color: var(--foreground); }
  h1, h2, h3 { margin: 0; font-family: 'Playfair Display', serif; }
  p, span, button, input, a, label { font-family: 'DM Sans', sans-serif; }
  ul { list-style: none; margin: 0; padding: 0; }
  button { cursor: pointer; font: inherit; }

  /* ---------- NAVBAR ---------- */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 50;
    width: 100%;
    background: rgba(255, 248, 249, 0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-soft);
  }
  .nav-inner {
    max-width: 72rem;
    margin: 0 auto;
    padding: 0 1.5rem;
    height: 4rem;
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .nav-logo {
    background: none;
    border: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
    margin-right: auto;
    text-decoration: none;
  }
  .nav-links { display: none; align-items: center; gap: 2rem; }
  .nav-links button {
    background: none;
    border: none;
    font-size: 0.875rem;
    font-weight: 500;
    color: #6b4352;
    transition: color 0.2s;
  }
  .nav-links button:hover { color: var(--primary); }
  .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
  .icon-btn {
    position: relative;
    padding: 0.5rem;
    background: none;
    border: none;
    color: var(--primary);
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    text-decoration: none;
  }
  .icon-btn:hover { background: var(--secondary); }
  .cart-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 1.25rem;
    height: 1.25rem;
    background: var(--primary);
    color: white;
    font-size: 0.65rem;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mobile-toggle {
    display: inline-flex;
    background: none;
    border: none;
    color: var(--primary);
    font-size: 1.25rem;
    padding: 0.5rem;
  }
  .mobile-menu {
    display: none;
    background: var(--background);
    border-top: 1px solid var(--border-soft);
    padding: 1rem 1.5rem;
    flex-direction: column;
    gap: 1rem;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu button {
    background: none;
    border: none;
    text-align: left;
    font-size: 0.875rem;
    font-weight: 500;
    color: #6b4352;
    padding: 0.25rem 0;
  }
  @media (min-width: 768px) {
    .nav-links { display: flex; }
    .mobile-toggle { display: none; }
    .mobile-menu { display: none !important; }
  }

  /* ---------- FOOTER ---------- */
  .footer {
    background: var(--footer-bg);
    color: rgba(255,255,255,0.7);
    padding-top: 3.5rem;
  }
  .footer-top {
    max-width: 72rem;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 3rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  @media (min-width: 768px) {
    .footer-top { flex-direction: row; }
  }
  .footer-brand h3 { font-size: 1.25rem; color: white; margin-bottom: 0.5rem; }
  .footer-brand p { font-size: 0.75rem; opacity: 0.6; }
  .footer-links { display: flex; gap: 3.5rem; flex-wrap: wrap; flex: 1; }
  .footer-col h4 {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: white;
    margin-bottom: 1rem;
  }
  .footer-col ul { display: flex; flex-direction: column; gap: 0.5rem; }
  .footer-col button {
    background: none;
    border: none;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    transition: color 0.2s;
    padding: 0;
  }
  .footer-col button:hover { color: #f9a8c9; }
  .footer-bottom {
    max-width: 72rem;
    margin: 0 auto;
    padding: 1.25rem 1.5rem;
    text-align: center;
    font-size: 0.75rem;
    opacity: 0.4;
  }

  .auth-screen {
    min-height: 100vh;
    background: linear-gradient(to bottom right, #fff0f5, #fce4ef, #f9d0e4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 1rem;
    position: relative;
    overflow: hidden;
  }

  .back-link {
    position: absolute;
    top: 1.5rem;
    left: 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted-foreground);
    font-size: 0.875rem;
    text-decoration: none;
    transition: color 0.2s;
    z-index: 2;
  }
  .back-link:hover { color: var(--primary); }

  .blob { position: absolute; border-radius: 999px; pointer-events: none; filter: blur(60px); }
  .blob-1 { top: -60px; right: -60px; width: 24rem; height: 24rem; background: rgba(249,188,212,0.3); }
  .blob-2 { bottom: -40px; left: -40px; width: 18rem; height: 18rem; background: rgba(252,228,239,0.5); }

  .auth-wrap { position: relative; width: 100%; max-width: 28rem; z-index: 1; }

  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo p:first-child {
    font-size: 2.25rem;
    font-style: italic;
    letter-spacing: 0.2em;
    color: var(--primary);
    margin: 0;
  }
  .auth-logo .tag { color: var(--muted-foreground); font-size: 0.875rem; margin-top: 0.25rem; }

  .auth-card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border-radius: 1.5rem;
    border: 1px solid rgba(201,64,112,0.12);
    box-shadow: 0 8px 60px rgba(201,64,112,0.12);
    overflow: hidden;
  }

  .tab-switcher { display: flex; border-bottom: 1px solid rgba(201,64,112,0.1); }
  .tab-btn {
    flex: 1;
    padding: 1rem;
    background: none;
    border: none;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--muted-foreground);
    position: relative;
    transition: color 0.2s;
  }
  .tab-btn:hover { color: var(--foreground); }
  .tab-btn.active { color: var(--primary); }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--primary);
  }

  .auth-form { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }

  .field-group { display: none; flex-direction: column; gap: 1rem; }
  .field-group.visible { display: flex; }

  .field label {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.75rem;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.375rem;
  }

  .field input {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 0.75rem;
    border: 1px solid rgba(201,64,112,0.2);
    background: #fdf7fa;
    color: var(--foreground);
    font-size: 0.875rem;
  }
  .field input:focus { outline: none; border-color: var(--primary); }
  .field input::placeholder { color: var(--muted-foreground); }

  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 3rem; }
  .toggle-eye {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted-foreground);
    display: inline-flex;
    padding: 0;
  }
  .toggle-eye:hover { color: var(--primary); }

  .error-msg {
    font-size: 0.75rem;
    color: var(--destructive);
    background: #fef2f2;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    border: 1px solid #fee2e2;
    display: none;
  }
  .error-msg.visible { display: block; }

  .forgot-btn {
    background: none;
    border: none;
    font-size: 0.75rem;
    color: var(--primary);
    text-align: right;
  }
  .forgot-btn:hover { text-decoration: underline; }

  .submit-btn {
    width: 100%;
    padding: 0.875rem;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(201,64,112,0.3);
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }
  .submit-btn:hover:not(:disabled) { background: var(--primary-dark); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .spinner {
    width: 1rem; height: 1rem;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 999px;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .switch-note {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted-foreground);
    margin-top: 0.25rem;
  }
  .switch-note button {
    background: none;
    border: none;
    color: var(--primary);
    font-weight: 500;
    font-size: 0.75rem;
    padding: 0;
  }
  .switch-note button:hover { text-decoration: underline; }

  .divider-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0.25rem 0;
  }
  .divider-row .line { flex: 1; height: 1px; background: var(--border); }
  .divider-row span { font-size: 0.75rem; color: var(--muted-foreground); white-space: nowrap; }

  .guest-btn {
    width: 100%;
    padding: 0.75rem;
    background: white;
    border: 1px solid rgba(201,64,112,0.25);
    color: var(--muted-foreground);
    border-radius: 999px;
    font-size: 0.875rem;
    transition: all 0.2s;
  }
  .guest-btn:hover { border-color: var(--primary); color: var(--primary); }

  .legal-note {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted-foreground);
    margin-top: 1.5rem;
  }
  .legal-note span { color: var(--primary); cursor: pointer; }
  .legal-note span:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">🎀 Dolci</a>

    <ul class="nav-links">
      <li><button data-page="home">Home</button></li>
      <li><button data-page="browse">Browse Cakes</button></li>
      <li><button data-page="customize">Customize</button></li>
    </ul>

    <div class="nav-actions">
      <button class="icon-btn" data-page="order" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
      </button>

      <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="mobile-menu" id="mobileMenu">
    <button data-page="home">Home</button>
    <button data-page="browse">Browse Cakes</button>
    <button data-page="customize">Customize</button>
  </div>
</nav>

<div class="auth-screen">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to DOLCI
  </a>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-wrap">
    <div class="auth-logo">
      <p>DOLCI</p>
      <p class="tag">Artisan Cakes, Made with Love</p>
    </div>

    <div class="auth-card">
      <div class="tab-switcher">
        <button class="tab-btn active" id="tabLogin" data-mode="login">Sign In</button>
        <button class="tab-btn" id="tabSignup" data-mode="signup">Create Account</button>
      </div>

      <form class="auth-form" id="authForm">
        <div class="field-group visible" id="fieldGroup">
          <div class="field" id="nameField" style="display:none;">
            <label>Full Name *</label>
            <input name="name" type="text" placeholder="John Doe" autocomplete="name">
          </div>

          <div class="field">
            <label>Email Address *</label>
            <input name="email" type="email" placeholder="name@gmail.com" autocomplete="email">
          </div>

          <div class="field" id="phoneField" style="display:none;">
            <label>Phone</label>
            <input name="phone" type="tel" placeholder="+63 912 345 6789">
          </div>

          <div class="field">
            <label>Password *</label>
            <div class="password-wrap">
              <input name="password" id="passwordInput" type="password" placeholder="Min. 6 characters" autocomplete="current-password">
              <button type="button" class="toggle-eye" id="toggleEye">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="field" id="addressField" style="display:none;">
            <label>Delivery Address</label>
            <input name="address" type="text" placeholder="Talamban, Cebu City, Philippines">
          </div>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button type="button" class="forgot-btn" id="forgotBtn">Forgot password?</button>

        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>

        <p class="switch-note" id="switchNote">
          Don't have an account? <button type="button" id="switchModeBtn">Sign up</button>
        </p>

        <div class="divider-row" id="dividerRow">
          <div class="line"></div><span>or continue as guest</span><div class="line"></div>
        </div>

        <button type="button" class="guest-btn" id="guestBtn">Browse as Guest</button>
      </form>
    </div>

    <p class="legal-note">
      By continuing, you agree to our <span>Terms of Service</span> and <span>Privacy Policy</span>.
    </p>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer" id="contact">
  <div class="footer-top">
    <div class="footer-brand" style="flex:1;">
      <h3>🎀 Dolci</h3>
      <p>A taste of sweet.</p>
    </div>

    <div class="footer-links">
      <div class="footer-col">
        <h4>Shop</h4>
        <ul>
          <li><button data-page="browse">Cakes</button></li>
          <li><button>Cookies</button></li>
          <li><button>Gift Boxes</button></li>
        </ul>
      </div>

      <div class="footer-col">
        <h4>Info</h4>
        <ul>
          <li><button>About Us</button></li>
          <li><button>Blog</button></li>
          <li><button>FAQ</button></li>
        </ul>
      </div>

      <div class="footer-col">
        <h4>Connect</h4>
        <ul>
          <li><button>Instagram</button></li>
          <li><button>Facebook</button></li>
          <li><button>TikTok</button></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="footer-bottom">© 2026 Dolci. Made with 🍓 and lots of butter.</div>
</footer>

<script src="common.js"></script>
<script src="pages.js"></script>

</html>
